<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>uBuilder — microBuilder</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap');

:root {
  --bg0:       #22263a;
  --bg1:       #272b3f;
  --bg2:       #2d3148;
  --bg3:       #343854;
  --bg4:       #3c4060;
  --panel:     #272b3f;
  --border:    #3e4268;
  --border2:   #4e5280;
  --blue:      #6b8aff;
  --blue-dim:  #3a4fa0;
  --blue-soft: #4a6adf;
  --cyan:      #4fc3f7;
  --cyan-dim:  #1a6080;
  --green:     #66bb6a;
  --green-dim: #2e5e30;
  --amber:     #ffb74d;
  --amber-dim: #7a5500;
  --red:       #ef5350;
  --text:      #cdd6f4;
  --text2:     #a6adc8;
  --text3:     #6c7086;
  --font-ui:   'Inter', sans-serif;
  --font-code: 'JetBrains Mono', monospace;
  --radius:    4px;
  --shadow:    0 2px 8px #00000060;
  --shadow-lg: 0 8px 32px #00000080;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg0);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 13px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  line-height: 1.5;
}

/* HEADER */
#header {
  background: var(--bg1);
  border-bottom: 1px solid var(--border);
  height: 44px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 8px;
  flex-shrink: 0;
  box-shadow: var(--shadow);
  z-index: 10;
}

.logo {
  font-family: var(--font-code);
  font-size: 15px;
  font-weight: 600;
  color: var(--blue);
  letter-spacing: 0.5px;
  white-space: nowrap;
  padding-right: 8px;
}
.logo span { color: var(--cyan); }

.h-sep { width: 1px; height: 24px; background: var(--border2); margin: 0 4px; flex-shrink: 0; }
.h-label { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 0.8px; text-transform: uppercase; padding: 0 4px; }
.h-group { display: flex; align-items: center; gap: 2px; }

.tb {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: var(--radius);
  border: 1px solid transparent; background: transparent;
  color: var(--text2); font-family: var(--font-ui);
  font-size: 12px; font-weight: 500; cursor: pointer;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
  white-space: nowrap;
}
.tb:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }
.tb.primary:hover { background: #2a3060; border-color: var(--blue-dim); color: var(--blue); }
.tb.success { color: var(--green); }
.tb.success:hover { background: #1e3a20; border-color: var(--green-dim); color: var(--green); }
.tb.warning { color: var(--amber); }
.tb.warning:hover { background: #3a2a10; border-color: var(--amber-dim); color: var(--amber); }

.spacer { flex: 1; }
.h-info { font-family: var(--font-code); font-size: 10px; color: var(--text3); display: flex; align-items: center; gap: 8px; }
.h-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

/* LAYOUT */
#main { display: flex; flex: 1; overflow: hidden; }

/* LEFT PANEL */
#left { width: 248px; flex-shrink: 0; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }

.panel-hdr {
  height: 36px; display: flex; align-items: center; padding: 0 12px; gap: 6px;
  border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 600;
  color: var(--text2); letter-spacing: 0.5px; text-transform: uppercase;
  background: var(--bg2); flex-shrink: 0;
}

.tree-wrap { flex: 1; overflow-y: auto; padding: 8px 0; }
.tree-wrap::-webkit-scrollbar { width: 4px; }
.tree-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.tree-sec { padding: 2px 8px; }

.tree-sec-hdr {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 6px; border-radius: var(--radius);
  cursor: pointer; user-select: none;
  font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
  transition: background 0.1s;
}
.tree-sec-hdr:hover { background: var(--bg3); }
.tree-sec-hdr.mal { color: var(--blue); }
.tree-sec-hdr.ral { color: var(--cyan); }
.chevron { font-size: 9px; color: var(--text3); transition: transform 0.18s; }
.tree-sec-hdr.open .chevron { transform: rotate(90deg); }
.badge { margin-left: auto; background: var(--bg4); border-radius: 10px; font-size: 10px; padding: 1px 6px; color: var(--text3); font-weight: 400; }

.tree-items { display: none; padding-left: 8px; }
.tree-items.open { display: block; }

.tree-item {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 8px; border-radius: var(--radius);
  cursor: pointer; font-size: 12px; color: var(--text2);
  transition: background 0.1s, color 0.1s;
}
.tree-item:hover { background: var(--bg3); color: var(--text); }
.tree-item.sel { background: #2a3060; color: var(--blue); }
.ti-icon { font-size: 9px; color: var(--text3); }
.tree-item.sel .ti-icon { color: var(--blue); }
.ti-del { margin-left: auto; opacity: 0; color: var(--text3); font-size: 15px; line-height: 1; transition: opacity 0.1s, color 0.1s; padding: 0 2px; }
.tree-item:hover .ti-del { opacity: 1; }
.ti-del:hover { color: var(--red) !important; }

.tree-add { display: flex; align-items: center; gap: 5px; padding: 4px 8px; border-radius: var(--radius); cursor: pointer; font-size: 11px; color: var(--text3); transition: color 0.1s, background 0.1s; }
.tree-add:hover { color: var(--blue); background: var(--bg3); }
.tree-add.ral:hover { color: var(--cyan); }

/* CANVAS */
#center { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.canvas-bar {
  height: 36px; background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 10px; gap: 4px; flex-shrink: 0;
}
.vbtn { padding: 3px 10px; border-radius: var(--radius); border: none; background: transparent; color: var(--text3); font-family: var(--font-ui); font-size: 11px; font-weight: 500; cursor: pointer; transition: background 0.1s, color 0.1s; }
.vbtn:hover { background: var(--bg3); color: var(--text2); }
.vbtn.active { background: var(--bg4); color: var(--blue); }
.cb-right { margin-left: auto; font-family: var(--font-code); font-size: 10px; color: var(--text3); }

#canvas {
  flex: 1; position: relative; overflow: hidden;
  background: radial-gradient(ellipse at 50% 40%, #232840 0%, var(--bg0) 70%);
}
.cgrid {
  position: absolute; inset: 0;
  background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 32px 32px; opacity: 0.25; pointer-events: none;
}
#cscroll { position: absolute; inset: 0; overflow: auto; }
#cinner { position: relative; min-width: 100%; min-height: 100%; padding: 32px; }

.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: calc(100vh - 160px); gap: 10px; pointer-events: none; user-select: none;
}
.empty-state .eicon { font-size: 36px; opacity: 0.1; }
.empty-state p { font-size: 12px; color: var(--text3); }
.empty-state .esub { font-size: 11px; }

/* CARDS */
.ub-card {
  position: absolute; background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 6px; min-width: 200px; box-shadow: var(--shadow);
  transition: box-shadow 0.15s, border-color 0.15s;
}
.ub-card:hover { box-shadow: var(--shadow-lg); border-color: var(--border2); }
.ub-card.overlap { border-color: var(--red) !important; box-shadow: 0 0 0 2px #ef535040, var(--shadow-lg) !important; }
.vbtn.snap-on { background: var(--bg4); color: var(--green); }
/* Memory type border colors */
.ub-card.mt-RAM   { border-color: #ffd600; }  /* yellow — RAM   */
.ub-card.mt-ROM   { border-color: #ef5350; }  /* red — ROM   */
.ub-card.mt-FLASH { border-color: #ef5350; }  /* red — FLASH */
.ub-card.mt-PERIPH   { border-color: #66bb6a; }  /* green — PERIPH */
.ub-card.mt-RAM.sel-mal,
.ub-card.mt-ROM.sel-mal,
.ub-card.mt-FLASH.sel-mal,
.ub-card.mt-PERIPH.sel-mal { border-color: #ffffff !important; box-shadow: 0 0 0 2px #ffffff40, var(--shadow-lg) !important; }
/* Card header tint per memory type */
.ch.mt-RAM   { background: #2a2700; }
.ch.mt-ROM   { background: #2a1010; }
.ch.mt-FLASH { background: #2a1010; }
.ch.mt-PERIPH   { background: #182a18; }
.ch.mt-RAM   .ctitle { color: #ffd600; }
.ch.mt-ROM   .ctitle { color: #ef5350; }
.ch.mt-FLASH .ctitle { color: #ef5350; }
.ch.mt-PERIPH   .ctitle { color: #66bb6a; }
/* Memory type badge */
.cbadge { font-size: 10px; padding: 1px 6px; border-radius: 3px; font-family: var(--font-code); font-weight: 500; }
.ub-card.sel-mal { border-color: var(--blue); box-shadow: 0 0 0 2px #6b8aff25, var(--shadow-lg); }
.ub-card.sel-ral { border-color: var(--cyan); box-shadow: 0 0 0 2px #4fc3f725, var(--shadow-lg); }

.ch { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--border); border-radius: 6px 6px 0 0; cursor: move; user-select: none; }
.ch.mal { background: #252a45; }
.ch.ral { background: #1e2d3a; }
.ctitle { font-size: 12px; font-weight: 600; font-family: var(--font-code); flex: 1; }
.ch.mal .ctitle { color: var(--blue); }
.ch.ral .ctitle { color: var(--cyan); }
.ch.mal .cbadge { background: #2a3060; color: var(--blue); }
.ch.ral .cbadge { background: #1a3048; color: var(--cyan); }
.cbadge.mt-RAM   { background: #2a2700 !important; color: #ffd600 !important; }
.cbadge.mt-ROM   { background: #2a1010 !important; color: #ef5350 !important; }
.cbadge.mt-FLASH { background: #2a1010 !important; color: #ef5350 !important; }
.cbadge.mt-PERIPH { background: #1a3a1a !important; color: #66bb6a !important; }
.cbody { padding: 8px 12px; display: flex; flex-direction: column; gap: 3px; }
.crow { display: flex; justify-content: space-between; align-items: center; font-size: 11px; padding: 1px 0; }
.ckey { color: var(--text3); font-family: var(--font-code); }
.cval { color: var(--text2); font-family: var(--font-code); font-size: 11px; }

/* RIGHT PANEL */
#right { width: 232px; flex-shrink: 0; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.prop-scroll { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 12px; }
.prop-scroll::-webkit-scrollbar { width: 4px; }
.prop-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.prop-grp { display: flex; flex-direction: column; gap: 4px; }
.prop-lbl { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; }
.prop-in, .prop-sel {
  background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius);
  color: var(--text); font-family: var(--font-code); font-size: 12px; padding: 6px 8px;
  outline: none; width: 100%; transition: border-color 0.12s;
}
.prop-in:focus { border-color: var(--blue); }
.prop-in:disabled { opacity: 0.4; cursor: not-allowed; }
.prop-sel { cursor: pointer; }
.prop-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 8px; color: var(--text3); text-align: center; padding: 24px; }
.prop-empty .peicon { font-size: 28px; opacity: 0.15; }
.prop-empty p { font-size: 11px; line-height: 1.6; }
.field-err {
  font-size: 10px;
  color: var(--red);
  min-height: 14px;
  display: block;
  margin-top: 2px;
}
.prop-in.err { border-color: var(--red); }

.del-btn { background: transparent; border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text3); font-family: var(--font-ui); font-size: 12px; padding: 6px 12px; cursor: pointer; width: 100%; transition: all 0.12s; }
.del-btn:hover { background: #3a1a1a; border-color: var(--red); color: var(--red); }

/* STATUS BAR */
#sbar { height: 26px; background: var(--blue-soft); display: flex; align-items: center; padding: 0 12px; gap: 16px; flex-shrink: 0; font-size: 11px; color: #fff; transition: background 0.3s; }
#sbar.err { background: var(--red); }
#sbar.warn { background: var(--amber); color: #1a1d2e; }
#smsg { flex: 1; font-weight: 500; }
.sright { display: flex; gap: 16px; font-family: var(--font-code); font-size: 10px; opacity: 0.85; }

/* MODAL */
.overlay { display: none; position: fixed; inset: 0; background: #00000090; z-index: 200; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 8px; box-shadow: var(--shadow-lg); min-width: 360px; overflow: hidden; }
.mhdr { background: var(--bg3); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; font-size: 13px; font-weight: 600; color: var(--text); }
.mx { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 20px; line-height: 1; transition: color 0.1s; }
.mx:hover { color: var(--red); }
.mbody { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.mfoot { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
.btn { padding: 6px 16px; border-radius: var(--radius); font-family: var(--font-ui); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.12s; border: 1px solid transparent; }
.btn-ghost { background: transparent; border-color: var(--border2); color: var(--text2); }
.btn-ghost:hover { border-color: var(--text2); color: var(--text); }
.btn-blue { background: var(--blue-soft); color: #fff; border-color: var(--blue-soft); }
.btn-blue:hover { background: var(--blue); border-color: var(--blue); }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="logo">μ<span>Builder</span></div>
  <div class="h-sep"></div>
  <span class="h-label">File</span>
  <div class="h-group">
    <button class="tb" onclick="newProject()">＋ New</button>
    <button class="tb" onclick="saveProject()">↓ Save</button>
    <button class="tb" onclick="loadProject()">↑ Load</button>
  </div>
  <div class="h-sep"></div>
  <span class="h-label">MAL/RAL</span>
  <div class="h-group">
    <button class="tb" onclick="exportYAML()">Export YAML</button>
    <button class="tb" onclick="importYAML()">Import YAML</button>
  </div>
  <div class="h-sep"></div>
  <span class="h-label">Generate</span>
  <div class="h-group">
    <button class="tb success" onclick="generateCode('target')">▶ Target C</button>
    <button class="tb warning" onclick="generateCode('simulation')">⟳ Simulation C</button>
  </div>
  <div class="spacer"></div>
  <div class="h-info">
    <div class="h-dot"></div>
    <span id="proj-lbl">untitled</span>
    <span style="color:var(--border2)">|</span>
    <span id="clock">--:--:--</span>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- LEFT -->
  <div id="left">
    <div class="panel-hdr">Project Tree</div>
    <div class="tree-wrap">
      <div class="tree-sec">
        <div class="tree-sec-hdr mal open" onclick="toggleSec(this,'mal-items')">
          <span class="chevron">▶</span> MAL
          <span class="badge" id="mal-badge">0</span>
        </div>
        <div class="tree-items open" id="mal-items">
          <div class="tree-add" onclick="openAdd('mal')">＋ Add Segment</div>
        </div>
      </div>
      <div class="tree-sec">
        <div class="tree-sec-hdr ral open" onclick="toggleSec(this,'ral-items')">
          <span class="chevron">▶</span> RAL
          <span class="badge" id="ral-badge">0</span>
        </div>
        <div class="tree-items open" id="ral-items">
          <div class="tree-add ral" onclick="openAdd('ral')">＋ Add register</div>
        </div>
      </div>
    </div>
  </div>

  <!-- CENTER -->
  <div id="center">
    <div class="canvas-bar">
      <button class="vbtn active" onclick="setView(this)">Design</button>
      <button class="vbtn" onclick="setView(this)">MAL</button>
      <button class="vbtn" onclick="setView(this)">RAL</button>
      <div style="width:1px;height:18px;background:var(--border2);margin:0 4px"></div>
      <button class="vbtn snap-btn" id="snap-btn" onclick="toggleSnap(this)" title="Snap to grid">⊞ Snap</button>
      <span class="cb-right" id="cinfo">0 nodes</span>
    </div>
    <div id="canvas">
      <div class="cgrid"></div>
      <div id="cscroll">
        <div id="cinner">
          <div class="empty-state" id="empty">
            <div class="eicon">⬡</div>
            <p>Canvas is empty</p>
            <p class="esub">Add MAL layers or RAL registers from the panel</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div id="right">
    <div class="panel-hdr">Properties</div>
    <div class="prop-scroll" id="prop-body">
      <div class="prop-empty">
        <div class="peicon">◫</div>
        <p>Select a node<br>to edit its properties</p>
      </div>
    </div>
  </div>

</div>

<!-- STATUS BAR -->
<div id="sbar">
  <span id="smsg">Ready</span>
  <div class="sright">
    <span>MAL <span id="st-mal">0</span></span>
    <span>RAL <span id="st-ral">0</span></span>
    <span id="st-proj">untitled</span>
  </div>
</div>

<!-- MODAL: Add MAL Segment -->
<div class="overlay" id="modal-mal">
  <div class="modal">
    <div class="mhdr">
      <span>Add MAL Segment</span>
      <button class="mx" onclick="closeModal('modal-mal')">×</button>
    </div>
    <div class="mbody">
      <div class="prop-grp">
        <label class="prop-lbl">Segment ID</label>
        <input class="prop-in" id="mal-id" placeholder="e.g. SEG_GPIO" oninput="clearFieldError('mal-id-err')" />
        <span class="field-err" id="mal-id-err"></span>
      </div>
      <div class="prop-grp">
        <label class="prop-lbl">Memory Type</label>
        <select class="prop-sel" id="mal-memtype">
          <option value="RAM">RAM</option>
          <option value="ROM">ROM</option>
          <option value="FLASH">FLASH</option>
          <option value="PERIPH">PERIPH</option>
        </select>
      </div>
      <div class="prop-grp">
        <label class="prop-lbl">Start Address (hex)</label>
        <input class="prop-in" id="mal-addr" placeholder="e.g. 0x40020000" oninput="clearFieldError('mal-addr-err')" />
        <span class="field-err" id="mal-addr-err"></span>
      </div>
      <div class="prop-grp">
        <label class="prop-lbl">Size (bytes, dec or hex)</label>
        <input class="prop-in" id="mal-size" placeholder="e.g. 256 or 0x100" oninput="clearFieldError('mal-addr-err')" />
      </div>
      <div class="prop-grp">
        <label class="prop-lbl">Fill byte (hex)</label>
        <input class="prop-in" id="mal-default" placeholder="e.g. 0x00" />
      </div>
      <div class="prop-grp">
        <label class="prop-lbl">Description</label>
        <input class="prop-in" id="mal-desc" placeholder="Brief description..." />
      </div>
    </div>
    <div class="mfoot">
      <button class="btn btn-ghost" onclick="closeModal('modal-mal')">Cancel</button>
      <button class="btn btn-blue" onclick="confirmAddMal()">Add Segment</button>
    </div>
  </div>
</div>

<!-- MODAL: Add RAL Register -->
<div class="overlay" id="modal-ral">
  <div class="modal">
    <div class="mhdr">
      <span>Add RAL Register</span>
      <button class="mx" onclick="closeModal('modal-ral')">×</button>
    </div>
    <div class="mbody">
      <div class="prop-grp">
        <label class="prop-lbl">Name</label>
        <input class="prop-in" id="ral-name" placeholder="e.g. CTRL_REG" oninput="clearFieldError('ral-name-err')" />
        <span class="field-err" id="ral-name-err"></span>
      </div>
      <div class="prop-grp">
        <label class="prop-lbl">Type</label>
        <select class="prop-sel" id="ral-type"></select>
      </div>
      <div class="prop-grp">
        <label class="prop-lbl">Description</label>
        <input class="prop-in" id="ral-desc" placeholder="Brief description..." />
      </div>
    </div>
    <div class="mfoot">
      <button class="btn btn-ghost" onclick="closeModal('modal-ral')">Cancel</button>
      <button class="btn btn-blue" onclick="confirmAddRal()">Add Register</button>
    </div>
  </div>
</div>

<script>
const GRID = 32;
const S = { project:'untitled', nodes:[], selected:null, nextId:1, adding:null, drag:null, dragOX:0, dragOY:0, snapEnabled:false };
const RAL_TYPES = ['register','bitfield','register_group','peripheral_block'];

setInterval(() => { document.getElementById('clock').textContent = new Date().toTimeString().slice(0,8); }, 1000);

function status(msg, type='') {
  const sb = document.getElementById('sbar');
  document.getElementById('smsg').textContent = msg;
  sb.className = type;
  if (type) setTimeout(() => { sb.className=''; document.getElementById('smsg').textContent='Ready'; }, 3000);
}

function updateStats() {
  const mal = S.nodes.filter(n=>n.layer==='mal').length;
  const ral = S.nodes.filter(n=>n.layer==='ral').length;
  document.getElementById('st-mal').textContent = mal;
  document.getElementById('st-ral').textContent = ral;
  document.getElementById('st-proj').textContent = S.project;
  document.getElementById('proj-lbl').textContent = S.project;
  document.getElementById('mal-badge').textContent = mal;
  document.getElementById('ral-badge').textContent = ral;
  document.getElementById('cinfo').textContent = S.nodes.length + ' node' + (S.nodes.length!==1?'s':'');
}

function toggleSec(hdr, id) { hdr.classList.toggle('open'); document.getElementById(id).classList.toggle('open'); }

function renderTree() {
  const me = document.getElementById('mal-items'), re = document.getElementById('ral-items');
  me.innerHTML = '<div class="tree-add" onclick="openAdd(\'mal\')">+ Add Segment</div>';
  re.innerHTML = '<div class="tree-add ral" onclick="openAdd(\'ral\')">＋ Add register</div>';
  S.nodes.forEach(n => {
    const d = document.createElement('div');
    d.className = 'tree-item' + (S.selected===n.id?' sel':'');
    d.innerHTML = `<span class="ti-icon">◆</span><span style="flex:1">${n.name}</span><span class="ti-del" onclick="event.stopPropagation();deleteNode(${n.id})">×</span>`;
    d.onclick = () => select(n.id);
    (n.layer==='mal'?me:re).insertBefore(d, (n.layer==='mal'?me:re).lastChild);
  });
}

function openAdd(layer) {
  S.adding = layer;
  if (layer === 'mal') {
    document.getElementById('mal-id').value = '';
    document.getElementById('mal-memtype').value = 'RAM';
    document.getElementById('mal-addr').value = '';
    document.getElementById('mal-size').value = '';
    document.getElementById('mal-default').value = '0x00';
    document.getElementById('mal-desc').value = '';
    document.getElementById('modal-mal').classList.add('open');
    setTimeout(()=>document.getElementById('mal-id').focus(), 80);
  } else {
    document.getElementById('ral-name').value = '';
    document.getElementById('ral-desc').value = '';
    document.getElementById('ral-type').innerHTML = RAL_TYPES.map(t=>`<option value="${t}">${t}</option>`).join('');
    document.getElementById('modal-ral').classList.add('open');
    setTimeout(()=>document.getElementById('ral-name').focus(), 80);
  }
}

function closeModal(id) {
  if (id) { document.getElementById(id).classList.remove('open'); return; }
  document.getElementById('modal-mal').classList.remove('open');
  document.getElementById('modal-ral').classList.remove('open');
}

/* ── helpers ── */
function parseHex(str) {
  const s = str.trim().toLowerCase();
  if (!s) return NaN;
  return parseInt(s.startsWith('0x') ? s : '0x'+s, 16);
}

function parseSize(str) {
  // Accept decimal (e.g. 256) or hex (e.g. 0x100 or 100)
  const s = str.trim().toLowerCase();
  if (!s) return NaN;
  if (s.startsWith('0x')) return parseInt(s, 16);
  // if it looks like pure hex digits (contains a-f), treat as hex
  if (/^[0-9a-f]+$/.test(s) && /[a-f]/.test(s)) return parseInt(s, 16);
  return parseInt(s, 10);
}

function setFieldError(id, msg) {
  const el = document.getElementById(id);
  if (el) { el.textContent = msg; }
  // also highlight the related input if possible
  const inputId = id.replace('-err','');
  const inp = document.getElementById(inputId);
  if (inp) inp.classList.toggle('err', !!msg);
}

function clearFieldError(id) {
  const el = document.getElementById(id);
  if (el) el.textContent = '';
  const inputId = id.replace('-err','');
  const inp = document.getElementById(inputId);
  if (inp) inp.classList.remove('err');
}

function isIdDuplicate(name, excludeNodeId) {
  return S.nodes.some(n => n.name === name && n.id !== excludeNodeId);
}

function segmentsOverlap(addrA, sizeA, addrB, sizeB) {
  // [addrA, addrA+sizeA) overlaps [addrB, addrB+sizeB)?
  return addrA < (addrB + sizeB) && addrB < (addrA + sizeA);
}

function checkSegmentOverlap(addr, size, excludeNodeId) {
  const existing = S.nodes.filter(n => n.layer === 'mal' && n.id !== excludeNodeId);
  for (const n of existing) {
    const eAddr = parseHex(n.segAddr);
    const eSize = Number(n.segSize);   // force numeric — prevents string concatenation bug
    if (!isNaN(eAddr) && eSize > 0 && segmentsOverlap(addr, size, eAddr, eSize)) {
      return n;
    }
  }
  return null;
}

function confirmAddMal() {
  let valid = true;
  clearFieldError('mal-id-err');
  clearFieldError('mal-addr-err');

  const segId = document.getElementById('mal-id').value.trim();
  if (!segId) {
    setFieldError('mal-id-err', 'Segment ID is required');
    valid = false;
  } else if (isIdDuplicate(segId, null)) {
    setFieldError('mal-id-err', `ID "${segId}" already exists — choose a different name`);
    document.getElementById('mal-id').focus();
    valid = false;
  }

  const addrStr = document.getElementById('mal-addr').value.trim() || '0x00000000';
  const addr    = parseHex(addrStr);
  const size    = parseSize(document.getElementById('mal-size').value);

  if (isNaN(addr)) {
    setFieldError('mal-addr-err', 'Invalid hex address');
    valid = false;
  }
  if (size <= 0) {
    setFieldError('mal-addr-err', (document.getElementById('mal-addr-err').textContent || '') + '  Size must be > 0');
    valid = false;
  }
  if (!isNaN(addr) && size > 0) {
    const overlap = checkSegmentOverlap(addr, size, null);
    if (overlap) {
      setFieldError('mal-addr-err',
        `Address range overlaps with segment "${overlap.name}" [${overlap.segAddr}, +${overlap.segSize}B]`);
      valid = false;
    }
  }

  if (!valid) return;

  const defVal = document.getElementById('mal-default').value.trim() || '0x00';
  const desc   = document.getElementById('mal-desc').value.trim();
  const memType = document.getElementById('mal-memtype').value;
  const n = { id:S.nextId++, layer:'mal', name:segId, type:'segment',
    memType, segAddr: addrStr, segSize: Number(size), segDefault:defVal, desc,
    x:48+Math.random()*320, y:48+Math.random()*200 };
  S.nodes.push(n);
  closeModal('modal-mal'); renderTree(); renderCanvas(); select(n.id); updateStats();
  status(`Segment "${segId}" added to MAL`);
}

function confirmAddRal() {
  clearFieldError('ral-name-err');
  const name = document.getElementById('ral-name').value.trim();
  if (!name) {
    setFieldError('ral-name-err', 'Name is required');
    return;
  }
  if (isIdDuplicate(name, null)) {
    setFieldError('ral-name-err', `ID "${name}" already exists — choose a different name`);
    document.getElementById('ral-name').focus();
    return;
  }
  const n = { id:S.nextId++, layer:'ral', name, type:document.getElementById('ral-type').value,
    desc:document.getElementById('ral-desc').value.trim(),
    x:48+Math.random()*320, y:48+Math.random()*200 };
  S.nodes.push(n);
  closeModal('modal-ral'); renderTree(); renderCanvas(); select(n.id); updateStats();
  status(`"${name}" added to RAL`);
}

function toHex(n) {
  if (isNaN(n) || n === null) return '—';
  return '0x' + n.toString(16).toUpperCase().padStart(8, '0');
}

function segEndAddr(n) {
  const addr = parseHex(n.segAddr);
  const size = Number(n.segSize);
  if (isNaN(addr) || !size) return '—';
  return toHex(addr + size - 1);
}

function segSizeStr(n) {
  const size = Number(n.segSize);
  if (!size) return '—';
  return toHex(size) + ' (' + size + ' B)';
}

function renderCanvas() {
  const inner = document.getElementById('cinner');
  document.getElementById('empty').style.display = S.nodes.length===0 ? 'flex' : 'none';
  inner.querySelectorAll('.ub-card').forEach(c => { if (!S.nodes.find(n=>n.id===+c.dataset.id)) c.remove(); });
  S.nodes.forEach(n => {
    let card = inner.querySelector(`[data-id="${n.id}"]`);
    if (!card) { card = makeCard(n); inner.appendChild(card); }
    card.style.left = n.x+'px'; card.style.top = n.y+'px';
    const isMal = n.layer==='mal';
    const mtClass = (isMal && n.memType) ? ' mt-' + n.memType : '';
    card.className = 'ub-card' + mtClass + (S.selected===n.id ? (isMal?' sel-mal':' sel-ral') : '');
    card.querySelector('.ctitle').textContent = n.name;
    const badge = card.querySelector('.cbadge');
    badge.textContent = isMal ? (n.memType || 'segment') : n.type;
    badge.className = 'cbadge' + (isMal && n.memType ? ' mt-' + n.memType : '');
    card.querySelector('.cbody').innerHTML = n.layer==='mal' ? `
      <div class="crow"><span class="ckey">start</span><span class="cval">${n.segAddr||'—'}</span></div>
      <div class="crow"><span class="ckey">end</span><span class="cval">${segEndAddr(n)}</span></div>
      <div class="crow"><span class="ckey">size</span><span class="cval">${segSizeStr(n)}</span></div>
      <div class="crow"><span class="ckey">fill</span><span class="cval">${n.segDefault||'0x00'}</span></div>
      ${n.desc?`<div class="crow"><span class="ckey">desc</span><span class="cval" style="max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${n.desc}</span></div>`:''}
    ` : `
      <div class="crow"><span class="ckey">type</span><span class="cval">${n.type}</span></div>
      ${n.desc?`<div class="crow"><span class="ckey">desc</span><span class="cval" style="max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${n.desc}</span></div>`:''}
    `;
  });
}

function makeCard(n) {
  const card = document.createElement('div');
  card.dataset.id = n.id;
  const isMal = n.layer==='mal';
  const hdr = document.createElement('div');
  hdr.className = `ch ${n.layer}${n.memType ? ' mt-' + n.memType : ''}`;
  hdr.innerHTML = `<span class="ctitle"></span><span class="cbadge"></span>`;
  card.appendChild(hdr);
  const body = document.createElement('div');
  body.className = 'cbody';
  card.appendChild(body);
  hdr.addEventListener('mousedown', e => {
    if (e.button!==0) return;
    select(n.id); S.drag=n;
    const r = card.getBoundingClientRect();
    S.dragOX = e.clientX-r.left; S.dragOY = e.clientY-r.top;
    e.preventDefault();
  });
  card.addEventListener('mousedown', e => { if (e.button===0) select(n.id); });
  return card;
}

function getCardRect(n) {
  const card = document.querySelector(`[data-id="${n.id}"]`);
  if (!card) return null;
  return { x: n.x, y: n.y, w: card.offsetWidth, h: card.offsetHeight };
}

function rectsOverlap(a, b) {
  const PAD = 4; // 4px gap minimum
  return a.x < b.x + b.w + PAD && a.x + a.w + PAD > b.x &&
         a.y < b.y + b.h + PAD && a.y + a.h + PAD > b.y;
}

function resolveOverlap(dragNode, nx, ny) {
  // Try the requested position; if it overlaps push away
  const others = S.nodes.filter(n => n.id !== dragNode.id);
  const dW = (document.querySelector(`[data-id="${dragNode.id}"]`) || {offsetWidth:200}).offsetWidth;
  const dH = (document.querySelector(`[data-id="${dragNode.id}"]`) || {offsetHeight:80}).offsetHeight;
  const dr = { x: nx, y: ny, w: dW, h: dH };

  for (const o of others) {
    const or = getCardRect(o);
    if (!or) continue;
    if (rectsOverlap(dr, or)) {
      // Push horizontally or vertically — choose shortest escape
      const pushRight = or.x + or.w + 8 - nx;
      const pushLeft  = nx + dW + 8 - or.x;
      const pushDown  = or.y + or.h + 8 - ny;
      const pushUp    = ny + dH + 8 - or.y;
      const minH = Math.min(pushRight, pushLeft);
      const minV = Math.min(pushDown, pushUp);
      if (minH <= minV) {
        nx = pushRight < pushLeft ? or.x + or.w + 8 : or.x - dW - 8;
      } else {
        ny = pushDown < pushUp ? or.y + or.h + 8 : or.y - dH - 8;
      }
      dr.x = nx; dr.y = ny;
    }
  }
  return { x: Math.max(0, nx), y: Math.max(0, ny) };
}

document.addEventListener('mousemove', e => {
  if (!S.drag) return;
  const sc = document.getElementById('cscroll'), r = sc.getBoundingClientRect();
  let nx = Math.max(0, e.clientX - r.left - S.dragOX + sc.scrollLeft);
  let ny = Math.max(0, e.clientY - r.top  - S.dragOY + sc.scrollTop);

  // snap to grid
  nx = snapVal(nx); ny = snapVal(ny);

  // resolve overlap
  const resolved = resolveOverlap(S.drag, nx, ny);
  S.drag.x = resolved.x;
  S.drag.y = resolved.y;
  renderCanvas();
});
document.addEventListener('mouseup', ()=>{ S.drag=null; });

function select(id) { S.selected=id; renderTree(); renderCanvas(); renderProps(); }

function renderProps() {
  const body = document.getElementById('prop-body');
  const n = S.nodes.find(n=>n.id===S.selected);
  if (!n) { body.innerHTML=`<div class="prop-empty"><div class="peicon">◫</div><p>Select a node<br>to edit its properties</p></div>`; return; }
  const malProps = n.layer==='mal' ? `
    <div class="prop-grp"><label class="prop-lbl">Segment ID</label><input class="prop-in" value="${n.name}" oninput="setProp('name',this.value)"/></div>
    <div class="prop-grp"><label class="prop-lbl">Memory Type</label><select class="prop-sel" onchange="setProp('memType',this.value)">${['RAM','ROM','FLASH','PERIPH'].map(t=>`<option value="${t}"${t===n.memType?' selected':''}>${t}</option>`).join('')}</select></div>
    <div class="prop-grp"><label class="prop-lbl">Start Address (hex)</label><input class="prop-in" value="${n.segAddr||''}" oninput="setProp('segAddr',this.value)" placeholder="0x40020000"/></div>
    <div class="prop-grp"><label class="prop-lbl">End Address</label><input class="prop-in" value="${segEndAddr(n)}" disabled style="opacity:0.6"/></div>
    <div class="prop-grp"><label class="prop-lbl">Size (dec or hex)</label><input class="prop-in" value="${n.segSize||''}" oninput="setProp('segSize',this.value)" placeholder="256 or 0x100"/></div>
    <div class="prop-grp"><label class="prop-lbl">Size (hex)</label><input class="prop-in" value="${segSizeStr(n)}" disabled style="opacity:0.6"/></div>
    <div class="prop-grp"><label class="prop-lbl">Fill byte (hex)</label><input class="prop-in" value="${n.segDefault||'0x00'}" oninput="setProp('segDefault',this.value)" placeholder="0x00"/></div>
    <div class="prop-grp"><label class="prop-lbl">Description</label><input class="prop-in" value="${n.desc}" oninput="setProp('desc',this.value)" placeholder="Description..."/></div>
  ` : `
    <div class="prop-grp"><label class="prop-lbl">Name</label><input class="prop-in" value="${n.name}" oninput="setProp('name',this.value)"/></div>
    <div class="prop-grp"><label class="prop-lbl">Type</label><select class="prop-sel" onchange="setProp('type',this.value)">${RAL_TYPES.map(t=>`<option value="${t}"${t===n.type?' selected':''}>${t}</option>`).join('')}</select></div>
    <div class="prop-grp"><label class="prop-lbl">Description</label><input class="prop-in" value="${n.desc}" oninput="setProp('desc',this.value)" placeholder="Description..."/></div>
  `;
  body.innerHTML = malProps + `
    <div class="prop-grp"><label class="prop-lbl">Layer</label><input class="prop-in" value="${n.layer.toUpperCase()}" disabled/></div>
    <div class="prop-grp" style="margin-top:auto;padding-top:8px;border-top:1px solid var(--border)">
      <button class="del-btn" onclick="deleteNode(${n.id})">Delete node</button>
    </div>`;
}

function setProp(k, v) {
  const n = S.nodes.find(n => n.id === S.selected);
  if (!n) return;

  // ID uniqueness check
  if (k === 'name' && v.trim()) {
    if (isIdDuplicate(v.trim(), n.id)) {
      status(`ID "${v.trim()}" already exists — choose a different name`, 'err');
      return;
    }
  }

  // Segment overlap check when editing address or size
  if (n.layer === 'mal' && (k === 'segAddr' || k === 'segSize')) {
    const addr = parseHex(k === 'segAddr' ? v : n.segAddr);
    const size = k === 'segSize' ? parseInt(v) : n.segSize;
    if (!isNaN(addr) && size > 0) {
      const overlap = checkSegmentOverlap(addr, size, n.id);
      if (overlap) {
        status(`Address range overlaps with segment "${overlap.name}" [${overlap.segAddr}, +${overlap.segSize}B]`, 'err');
        return;
      }
    }
  }

  n[k] = (k === 'segSize') ? Number(parseSize(v)) : v;
  renderTree(); renderCanvas(); updateStats();
}

function deleteNode(id) { S.nodes=S.nodes.filter(n=>n.id!==id); if(S.selected===id)S.selected=null; renderTree(); renderCanvas(); renderProps(); updateStats(); status('Node deleted'); }

function setView(btn) { document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }

function toggleSnap(btn) {
  S.snapEnabled = !S.snapEnabled;
  btn.classList.toggle('snap-on', S.snapEnabled);
  status(S.snapEnabled ? 'Snap to grid: ON' : 'Snap to grid: OFF');
}

function snapVal(v) {
  return S.snapEnabled ? Math.round(v / GRID) * GRID : v;
}

function newProject() {
  if (S.nodes.length>0 && !confirm('Create new project? Unsaved changes will be lost.')) return;
  Object.assign(S,{nodes:[],selected:null,project:'untitled',nextId:1});
  renderTree(); renderCanvas(); renderProps(); updateStats(); status('New project created');
}

function saveProject() {
  const name=prompt('Project name:',S.project); if(!name)return;
  S.project=name;
  download(name+'.ubp', JSON.stringify({name,nodes:S.nodes,nextId:S.nextId},null,2));
  updateStats(); status(`Project "${name}" saved`);
}

function loadProject() {
  pickFile('.ubp,.json', text=>{
    try {
      const d=JSON.parse(text);
      const nodes = (d.nodes||[]).map(n => ({...n, segSize: n.segSize ? Number(n.segSize) : 0}));
      Object.assign(S,{nodes,project:d.name||'untitled',nextId:d.nextId||1,selected:null});
      renderTree(); renderCanvas(); renderProps(); updateStats(); status(`Project "${S.project}" loaded`);
    } catch { status('Invalid project file','err'); }
  });
}

function exportYAML() {
  const mal=S.nodes.filter(n=>n.layer==='mal'), ral=S.nodes.filter(n=>n.layer==='ral');
  let y=`# uBuilder — ${S.project}\n\nmal:\n`;
  mal.forEach(n=>{y+=`  - name: ${n.name}\n    memType: ${n.memType||'RAM'}\n    segAddr: ${n.segAddr||'0x00000000'}\n    segSize: ${n.segSize||0}\n    segDefault: ${n.segDefault||'0x00'}\n    desc: "${n.desc}"\n`;});
  y+=`\nral:\n`;
  ral.forEach(n=>{y+=`  - name: ${n.name}\n    type: ${n.type}\n    desc: "${n.desc}"\n`;});
  download(S.project+'_mal_ral.yaml',y); status('Exported to YAML');
}

function importYAML() {
  pickFile('.yaml,.yml', text=>{
    try { parseYAML(text); renderTree(); renderCanvas(); renderProps(); updateStats(); status('YAML imported'); }
    catch { status('Invalid YAML file','err'); }
  });
}

function parseYAML(text) {
  let sec=null, cur=null;
  text.split('\n').forEach(line=>{
    if(/^mal:/.test(line)){sec='mal';return;} if(/^ral:/.test(line)){sec='ral';return;} if(!sec)return;
    const nm=line.match(/^\s+-\s+name:\s*(.+)/);
    if(nm){cur={id:S.nextId++,layer:sec,name:nm[1].trim(),type:sec==='mal'?'segment':'register',segAddr:'0x00000000',segSize:0,segDefault:'0x00',desc:'',x:48+Math.random()*320,y:48+Math.random()*200};S.nodes.push(cur);return;}
    if(!cur)return;
    const tm=line.match(/^\s+type:\s*(.+)/); if(tm){cur.type=tm[1].trim();return;}
    const dm=line.match(/^\s+desc:\s*"?([^"]*)"?/); if(dm)cur.desc=dm[1].trim();
  });
}

function generateCode(mode) {
  if(!S.nodes.length){status('No nodes to generate code from','warn');return;}
  const mal=S.nodes.filter(n=>n.layer==='mal'), ral=S.nodes.filter(n=>n.layer==='ral');
  let c=`/**\n * uBuilder — Generated Code\n * Project : ${S.project}\n * Mode    : ${mode.toUpperCase()}\n */\n\n#ifndef UBUILDER_${S.project.toUpperCase()}_H\n#define UBUILDER_${S.project.toUpperCase()}_H\n\n#include <stdint.h>\n`;
  if(mode==='simulation')c+=`#include "ubuilder_sim.h"\n`;
  c+=`\n/* ── RAL — Register Abstraction Layer ── */\n`;
  ral.forEach(n=>{c+=`\n/** ${n.desc||n.name} */\ntypedef struct {\n    volatile uint32_t VALUE;\n    volatile uint32_t MASK;\n    volatile uint32_t STATUS;\n} ${n.name}_reg_t;\n`;});
  c+=`\n/* ── MAL — Microcontroller Abstraction Layer ── */\n`;
  mal.forEach(n=>{c+=`\n/** ${n.desc||n.name} (${n.type}) */\nvoid ${n.name}_init(void);\nvoid ${n.name}_deinit(void);\nint  ${n.name}_configure(const ${n.name}_config_t *cfg);\n`;});
  c+=`\n#endif /* UBUILDER_${S.project.toUpperCase()}_H */\n`;
  download(`${S.project}_${mode}.h`,c); status(`C header generated — ${mode} mode`);
}

function download(filename, content) { const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([content],{type:'text/plain'})); a.download=filename; a.click(); }
function pickFile(accept, cb) { const i=document.createElement('input'); i.type='file'; i.accept=accept; i.onchange=e=>{const r=new FileReader();r.onload=ev=>cb(ev.target.result);r.readAsText(e.target.files[0]);}; i.click(); }

document.addEventListener('keydown', e=>{
  if(e.key==='Escape')closeModal();
  if((e.key==='Delete'||e.key==='Backspace')&&S.selected&&document.activeElement===document.body)deleteNode(S.selected);
});
document.getElementById('modal-mal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal('modal-mal');});
document.getElementById('modal-ral').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal('modal-ral');});

updateStats();
</script>
